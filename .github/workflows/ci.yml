name: Node.js CI

on:
  push:
    branches:
      - main  # 触发 CI 流程的分支是 main
  pull_request:
    branches:
      - main  # 当向 main 分支提交 PR 时触发 CI 流程

jobs:
  build:
    runs-on: ubuntu-latest  # 在 Ubuntu 环境下运行

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # 检出代码

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  # 设置 Node.js 版本为 14

    - name: Install dependencies
      run: npm install  # 安装项目依赖

    - name: Run tests
      run: npm test  # 运行测试

    - name: Build project
      run: npm run build  # 构建项目