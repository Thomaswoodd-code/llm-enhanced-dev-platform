<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitLab Project Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }

    header {
      background-color: #24292f;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .project-info {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
    }

    .btn {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <header>
    <h1>GitLab Project Dashboard</h1>
  </header>

  <div class="container">
    <div class="project-info">
      <h2>Project Name: LLM Enhanced Dev Platform</h2>
      <p><strong>Description:</strong> This is a platform to integrate GitLab API, OpenAPI, and LLM for enhanced developer productivity.</p>
      <p><strong>Current Status:</strong> Active</p>
      <p><strong>Last Commit:</strong> <em>Updated the README and improved project structure</em></p>

      <a href="https://gitlab.com/your-organization/llm-enhanced-dev-platform" class="btn" target="_blank">View on GitLab</a>
    </div>
  </div>
</body>
</html>
